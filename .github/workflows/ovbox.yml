name: OVBOX

on:
  push:
    branches: [ main ]

jobs:
  build:

    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4
    - name: fetchall
      run: git fetch --unshallow --tags
    - name: github-cmake workaround
      run: brew uninstall cmake
    - name: lsl
      run: brew tap labstreaminglayer/tap
    - name: trust
      run: brew trust aws/tap labstreaminglayer/tap
    - name: installation
      run: brew install -v gisogrimm/tap/ovbox
    - name: ovboxversion
      run: ovbox_version
